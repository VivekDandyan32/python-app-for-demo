  publish-hc:
    runs-on: ubuntu-latest
    steps:
# install and configure helm 
      - name: checkout repo
        uses: actions/checkout@v5
      
      - name: setup helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0
      
      - name: helm version
        run: helm version

# lint helm files
      - name: helm lint
        run: helm lint charts/

# create helm chart via files in charts folder
      - name: create package
        run: |
          helm package charts/
          ls -ltr .
        

      

      



name: app-workflow

on: 
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version : '3.10'
      - name: install dependancies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirments.txt
      - name: run unit tests
        run: pytest -v
      
        

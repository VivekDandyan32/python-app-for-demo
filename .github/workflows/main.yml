name: CI Pipeline
# call workflows
on: 
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:  
  actions: read
  security-events: write
  packages: write
  contents: read
  

jobs:
  ci-pipeline-job:
    uses: VivekDandyan32/reusable-workflows/.github/workflows/ci-pipeline.yaml@main
    with:
      run_codeql: true
      run_sonarqube: true
      run_build: true
      run_publish-ghcr: true
    secrets: 
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  
  depoy-with-kubectl:
    needs: ci-pipeline-job
    runs-on: github-actions-scaleset-config-demo
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0

      - name: Install kubectl
        run: | 
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure kubeconfig
        run: | 
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          echo "===== kubeconfig ====="
          kubectl config current-context
          kubectl config view --minify

          echo "===== kubectl client ====="
          kubectl version --client

          echo "===== cluster-info ====="
          kubectl cluster-info

          echo "===== get nodes ====="
          kubectl get nodes
              
      
# yq - update item in yaml file - tool yaml querry
      - name: install yq
        run: |
            sudo curl -L "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o /usr/local/bin/yq 
            sudo chmod +x /usr/local/bin/yq
            yq --version

      - name: update image name in deployment yaml file
        run: |
          IMAGE_TAGS="${{ github.run.id }}-${ GITHUB_SHA::7 }"
          IMAGE="ghcr.io/vivekdandyan32/viki_app:${IMAGE_TAGS}"
          yw e '.spec.template.spec.containers[0].image = strenv(IMAGE)' manifest/deployment.yaml -i
          cat manifest/deployment.yaml
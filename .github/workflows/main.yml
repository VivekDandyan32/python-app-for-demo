name: CI Pipeline
# call workflows
on: 
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:  
  actions: read
  security-events: write
  packages: write
  contents: read
  

jobs:
  ci-pipeline-job:
    uses: VivekDandyan32/reusable-workflows/.github/workflows/ci-pipeline.yaml@main
    with:
      run_codeql: true
      run_sonarqube: true
      run_build: true
      run_publish-ghcr: true
    secrets: 
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  
  depoy-with-kubectl:
    needs: ci-pipeline-job
    uses:  VivekDandyan32/reusable-workflows/.github/workflows/deployment-with-kubectl.yaml@main
    with:
      ENVIRONMENT: STAGING
      NAMESPACE: ${{ vars.NAMESPACE }}
      IMAGE_NAME: ghcr.io/vivekdandyan32/viki_app

    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}  
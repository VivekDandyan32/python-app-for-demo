name: CI Pipeline

on: 
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version : '3.10'
      - name: install dependancies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirments.txt
      - name: run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
      
      - name: upload code coverage reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-code-coverage-report
          path: reports/

# upload the analysis in security tab
# permission required for workflow execution to do that 
  codeql: 
    name: codeQL for check vulernabilty in code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write #to uplaod the analysis report 
      
    strategy:
      matrix: 
        language: [ 'python']  
      
    steps:
      - name: checkout code
        uses: actions/checkout@v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"
  
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v7.0.0 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: Download coverage report
        uses: actions/download-artifact@v8.0.1
        with:
          name: unit-test-code-coverage-report
          path: reports/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}        
      - name: SonarQube Quality Gate Check 
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [ codeql, sonarqube]
    if: success()
    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}
    steps: 
      - name: checkout code
        uses: actions/checkout@v7.0.0
      
      # - name: Build docker image
      #   run: |
      #     docker build -t my-flask-app .
      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3.0.0
        
      - name: generate image tags
        id: vars
        run: |
          IMAGE_TAGS = "${{ github.run_id}}-{{GITHUB_SHA::7}}"
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT

      - name: Build Image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: viki_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          load: true

      - name: save docker image 
        run: docker save viki_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o viki_app.tar

      - name: upload docker image artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: viki_app
          path: viki_app.tar


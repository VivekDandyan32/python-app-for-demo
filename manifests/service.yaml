apiVersion: v1
kind: Service
metadata:
  name: viki-app-svc
  labels:
    app: viki-app
spec:
  selector:
    app: viki-app
  type: NodePort
  # sessionAffinity: None
  # sessionAffinityConfig:
  #   clientIP:
  #     timeoutSeconds: 10800
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    # If you set the `spec.type` field to `NodePort` and you want a specific port number,
    # you can specify a value in the `spec.ports[*].nodePort` field.
    nodePort: 30007